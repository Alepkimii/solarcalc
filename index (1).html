<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSPARX Style Solar Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00B884;
            --primary-dark: #008f68;
            --navy: #0A1F3D;
            --red: #EF4444;
            --bg: #F0F4F8;
            --white: #ffffff;
            --border: #D1D5DB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--navy);
            margin: 0;
            padding: 10px;
        }

        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* Side Panel */
        .panel {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: #4B5563; text-transform: uppercase; }
        
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--bg);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="range"] { width: 100%; accent-color: var(--primary); }

        /* Main Content */
        .main-display {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-bottom: 4px solid var(--primary);
        }

        .stat-card.roi { border-bottom-color: var(--navy); }
        .stat-card.expense { border-bottom-color: var(--red); }

        .stat-card span { display: block; font-size: 0.8rem; color: #64748B; margin-bottom: 5px; }
        .stat-card b { font-size: 1.5rem; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            min-height: 400px;
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: var(--navy); border-left: 4px solid var(--primary); padding-left: 10px; }

        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- INPUTS -->
    <div class="panel">
        <h2 style="border:none; padding:0; font-size: 1.4rem; margin-bottom: 25px;">Solar Estimator</h2>
        
        <div class="input-group">
            <label>Phase System</label>
            <select id="phase">
                <option value="4500">1-Phase (RM 4,500/kWp)</option>
                <option value="4200">3-Phase (RM 4,200/kWp)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Investment Budget: RM <span id="budgetText">15,000</span></label>
            <input type="range" id="budgetSlider" min="5000" max="80000" step="1000" value="15000">
        </div>

        <div class="input-group">
            <label>Monthly TNB Bill (RM)</label>
            <input type="number" id="bill" value="400">
        </div>

        <div class="input-group">
            <label>Monthly Usage (kWh)</label>
            <input type="number" id="kwh" value="650">
        </div>

        <div style="background: var(--bg); padding: 15px; border-radius: 10px; font-size: 0.8rem;">
            <i class="fa-solid fa-circle-info"></i> Simulation assumes 3% annual tariff increase and 3.5 peak sun hours.
        </div>
    </div>

    <!-- VISUALS -->
    <div class="main-display">
        <div class="top-stats">
            <div class="stat-card">
                <span>System Size</span>
                <b id="statSize">0.0 kWp</b>
            </div>
            <div class="stat-card roi">
                <span>Payback Period</span>
                <b id="statPayback">0.0 Years</b>
            </div>
            <div class="stat-card expense">
                <span>10-Year Net Gain</span>
                <b id="statGain">RM 0</b>
            </div>
        </div>

        <div class="charts-grid">
            <!-- Chart 1: Cumulative Savings -->
            <div class="chart-card">
                <h2>10-Year Cumulative Savings</h2>
                <div style="height: 330px;"><canvas id="chartSavings"></canvas></div>
            </div>

            <!-- Chart 2: Expenditure Comparison -->
            <div class="chart-card">
                <h2>Total Cash Outflow Comparison</h2>
                <div style="height: 330px;"><canvas id="chartComparison"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    let chartSavings, chartComparison;

    const inputs = {
        phase: document.getElementById('phase'),
        budget: document.getElementById('budgetSlider'),
        bill: document.getElementById('bill'),
        kwh: document.getElementById('kwh'),
        budgetText: document.getElementById('budgetText')
    };

    const stats = {
        size: document.getElementById('statSize'),
        payback: document.getElementById('statPayback'),
        gain: document.getElementById('statGain')
    };

    function initCharts() {
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true, ticks: { callback: v => 'RM' + v.toLocaleString() } } }
        };

        chartSavings = new Chart(document.getElementById('chartSavings'), {
            type: 'line',
            data: {
                labels: Array.from({length: 11}, (_, i) => 'Year ' + i),
                datasets: [{
                    label: 'Money Saved (Cumulative)',
                    borderColor: '#00B884',
                    backgroundColor: 'rgba(0, 184, 132, 0.1)',
                    fill: true,
                    data: [],
                    tension: 0.3
                }]
            },
            options: commonOptions
        });

        chartComparison = new Chart(document.getElementById('chartComparison'), {
            type: 'line',
            data: {
                labels: Array.from({length: 11}, (_, i) => 'Year ' + i),
                datasets: [
                    {
                        label: 'Scenario A: Without Solar',
                        borderColor: '#EF4444',
                        data: [],
                        borderDash: [5, 5],
                        tension: 0.1
                    },
                    {
                        label: 'Scenario B: With Solar (Price + Bills)',
                        borderColor: '#0A1F3D',
                        backgroundColor: 'rgba(10, 31, 61, 0.05)',
                        fill: true,
                        data: [],
                        tension: 0.1
                    }
                ]
            },
            options: commonOptions
        });
    }

    function calculate() {
        const costPerKwp = parseFloat(inputs.phase.value);
        const budget = parseFloat(inputs.budget.value);
        const monthlyBill = parseFloat(inputs.bill.value);
        const monthlyKwh = parseFloat(inputs.kwh.value);
        
        inputs.budgetText.innerText = budget.toLocaleString();

        // 1. Sizing
        const kwp = budget / costPerKwp;
        const solarGenPerMonth = kwp * 3.5 * 30; // 3.5 peak hours
        
        // 2. Monthly Savings
        // Blended tariff ~0.51 RM. Saving cannot exceed current bill.
        const potentialSavings = Math.min(solarGenPerMonth * 0.51, monthlyBill);
        
        let cumulativeSavings = [0];
        let totalOutflowNoSolar = [0];
        let totalOutflowWithSolar = [budget]; // Year 0 starts with the purchase cost

        let paybackYear = -1;

        for (let y = 1; y <= 10; y++) {
            const inflation = Math.pow(1.03, y); // 3% tariff hike
            
            // Savings
            const annualSaving = (potentialSavings * 12) * inflation;
            cumulativeSavings.push(Math.round(cumulativeSavings[y-1] + annualSaving));

            // Scenario A: Just paying TNB
            const annualBillNoSolar = (monthlyBill * 12) * inflation;
            totalOutflowNoSolar.push(Math.round(totalOutflowNoSolar[y-1] + annualBillNoSolar));

            // Scenario B: Paying remaining TNB bill + initial cost
            const annualBillWithSolar = ((monthlyBill - potentialSavings) * 12) * inflation;
            totalOutflowWithSolar.push(Math.round(totalOutflowWithSolar[y-1] + annualBillWithSolar));

            // Payback logic
            if (paybackYear === -1 && totalOutflowWithSolar[y] < totalOutflowNoSolar[y]) {
                paybackYear = y - ( (totalOutflowNoSolar[y] - totalOutflowWithSolar[y]) / annualSaving );
            }
        }

        // Update Stats
        stats.size.innerText = kwp.toFixed(2) + " kWp";
        stats.gain.innerText = "RM " + (totalOutflowNoSolar[10] - totalOutflowWithSolar[10]).toLocaleString();
        
        if(potentialSavings > 0) {
            const pb = budget / (potentialSavings * 12);
            stats.payback.innerText = pb.toFixed(1) + " Years";
        } else {
            stats.payback.innerText = "N/A";
        }

        // Update Charts
        chartSavings.data.datasets[0].data = cumulativeSavings;
        chartComparison.data.datasets[0].data = totalOutflowNoSolar;
        chartComparison.data.datasets[1].data = totalOutflowWithSolar;

        chartSavings.update('none');
        chartComparison.update('none');
    }

    initCharts();
    calculate();

    // Listeners
    [inputs.phase, inputs.budget, inputs.bill, inputs.kwh].forEach(el => {
        el.addEventListener('input', calculate);
    });

</script>

</body>
</html>
